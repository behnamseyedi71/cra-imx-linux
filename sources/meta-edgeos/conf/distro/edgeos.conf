# EdgeOS — Headless real-time robotics/edge-AI distro for i.MX8 family
# Inherits NXP framebuffer base (no compositor, minimal display stack)
require conf/distro/fsl-imx-fb.conf

DISTRO        = "edgeos"
DISTRO_NAME   = "EdgeOS"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "robotics-r1"

# Ensure the target hostname is set at image level
hostname:pn-base-files = "edgeos-device"

# ── Package format ────────────────────────────────────────────────────────────
# IPK is the lightest format for on-device opkg package management
PACKAGE_CLASSES = "package_ipk"

# ── Display / window-system features ─────────────────────────────────────────
# fsl-imx-fb already strips x11/wayland; also remove vulkan and directfb
# which are unused on a headless robotics node
DISTRO_FEATURES:remove = "vulkan directfb"

# ── CRA (Cyber Resilience Act) compliance ────────────────────────────────────
# CVE scanning runs at parse time for every recipe; reports land in tmp/log/cve/
INHERIT += "cve-check"

# SPDX SBOM is generated automatically alongside every image artifact
INHERIT += "create-spdx"

# ── Open-source license compliance (required for public distribution) ─────────
# Embeds a per-package license manifest and the full license texts into the image
# at /usr/share/licenses/. Required for GPL/LGPL written-offer compliance.
COPY_LIC_MANIFEST = "1"
COPY_LIC_DIRS     = "1"

# Archive patched source for every GPL, LGPL, and AGPL package.
# Output lands in DEPLOY_DIR/sources/ and must be hosted alongside the image
# download to satisfy copyleft source-availability obligations.
INHERIT += "archiver"
ARCHIVER_MODE[src]  = "patched"
ARCHIVER_MODE[diff] = "0"
COPYLEFT_LICENSE_INCLUDE = "GPL* LGPL* AGPL*"
COPYLEFT_LICENSE_EXCLUDE = "CLOSED Proprietary"
COPYLEFT_RECIPE_TYPES    = "target"

# ── NXP proprietary binary blobs ─────────────────────────────────────────────
# Several NXP packages (firmware-ele-imx, imx-gpu-viv, imx-vpu-hantro,
# imx-codec, imx-gpu-g2d) are distributed under the NXP Software License
# Agreement. ACCEPT_FSL_EULA = "1" in local.conf permits building them.
#
# *** DISTRIBUTION REQUIREMENT ***
# Before making the built image publicly available, your download page MUST
# present the NXP EULA and require acceptance before the user can download.
# The full EULA text is at:
#   sources/meta-imx/meta-imx-bsp/EULA (or NXP's website)
# This is a legal requirement; failure to do so violates the NXP license.
#
# ── AGPL-3.0 notice (python3-ultralytics) ───────────────────────────────────
# ultralytics is AGPL-3.0-only. For free/open distribution this is permitted
# provided that the corresponding source is accessible to all recipients.
# The upstream source is permanently available at:
#   https://github.com/ultralytics/ultralytics  (tag: v8.3.119)
# The archiver class above also captures the deployed source archive.
