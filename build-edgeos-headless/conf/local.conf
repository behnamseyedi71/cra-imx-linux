# ===========================================================================
# local.conf — build-environment overrides ONLY
#
# Product identity (DISTRO_NAME, hostname, image packages, security policy)
# lives in sources/meta-edgeos. This file controls only the local build
# environment and should NOT be committed to a shared repository as-is.
# ===========================================================================

# ── Target ──────────────────────────────────────────────────────────────────
MACHINE = "imx8mp-lpddr4-evk"
DISTRO  = "edgeos"

# ── Build infrastructure ─────────────────────────────────────────────────────
CONF_VERSION = "2"
DL_DIR      ?= "${BSPDIR}/downloads/"
ACCEPT_FSL_EULA = "1"

# ── Parallelism — tuned for 16-core / 40 GB RAM host ─────────────────────────
# Rule of thumb: BB_NUMBER_THREADS × avg-peak-RAM-per-task < available RAM.
# Heavy tasks here are onnxruntime (~8 GB link), TFLite (~4 GB), OpenCV (~2 GB).
# 8 parallel tasks × 4 make threads keeps peak under ~35 GB.
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE     = "-j 4"

# Per-recipe caps for known memory-intensive C++ builds:
# onnxruntime uses LLVM-style optimization passes that can spike to 8–12 GB.
PARALLEL_MAKE:pn-onnxruntime        = "-j 2"
# TFLite links large XNNPack / RUY objects; 4 threads is the safe ceiling.
PARALLEL_MAKE:pn-tensorflow-lite    = "-j 4"
# VX delegate links against the GC GPU stack — heavy at link time.
PARALLEL_MAKE:pn-tensorflow-lite-vx-delegate = "-j 2"
# OpenCV with contrib modules can spike during template instantiation.
PARALLEL_MAKE:pn-opencv             = "-j 4"
# ROS2 C++ packages use heavy template metaprogramming.
PARALLEL_MAKE:pn-ros-base           = "-j 4"
PARALLEL_MAKE:pn-rclcpp             = "-j 4"

# Complete in-progress tasks before spawning new ones; reduces memory peaks
# by preventing multiple heavyweight link phases from overlapping.
BB_SCHEDULER = "completion"

# ── Build statistics and conflict resolution ─────────────────────────────────
USER_CLASSES  ?= "buildstats"
PATCHRESOLVE   = "noop"

# ── Disk space guards ─────────────────────────────────────────────────────────
BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

PACKAGECONFIG:append:pn-qemu-system-native = " sdl"

# ── Disk space management ─────────────────────────────────────────────────────
# Automatically delete each recipe's work directory after it is successfully
# packaged. Saves 100-200 GB on a full build. The sstate-cache preserves the
# build output so recipes are not re-built on the next run.
INHERIT += "rm_work"
# Keep these around in case we need to inspect them after a failure:
RM_WORK_EXCLUDE += "onnxruntime tensorflow-lite python3-ultralytics"

# ── Fetch mirrors ─────────────────────────────────────────────────────────────
# Rust crates from crates.io are rate-limited and sometimes unreachable.
# Point the crate:// fetcher at the Yocto project public mirror first so the
# build doesn't stall waiting for crates.io retries.
PREMIRRORS:prepend = "crate://crates.io/.* https://downloads.yoctoproject.org/mirror/sources/ \n"

# ── Ubuntu 24 host tip ────────────────────────────────────────────────────────
# If the build still OOM-crashes, run once as root before starting bitbake:
#   echo 1 > /proc/sys/vm/overcommit_memory
#   sysctl -w vm.swappiness=10
# overcommit_memory=1 lets the kernel honour large mmap() calls that Yocto's
# make and ninja use internally; the default (0 = heuristic) can refuse
# allocations that are actually safe and trigger early OOM kills.
