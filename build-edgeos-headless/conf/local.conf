# ===========================================================================
# local.conf: build-environment overrides ONLY.
#
# Product identity (DISTRO_NAME, hostname, image packages, security policy)
# lives in sources/meta-edgeos. This file only controls the local build
# environment and should NOT be shared as-is between developers without
# editing the absolute paths below.
# ===========================================================================

# Target.
MACHINE = "imx8mp-lpddr4-evk"
DISTRO  = "edgeos"

# Build infrastructure.
CONF_VERSION = "2"
ACCEPT_FSL_EULA = "1"

# Persistent caches. These survive a workspace wipe or re-clone.
# Keep them on a stable path. On a new machine, copy downloads/ and
# sstate-cache/ here and the build will skip downloading and most
# compilation automatically.
DL_DIR     = "/home/mentor/cra-imx-linux/downloads"
SSTATE_DIR = "/home/mentor/cra-imx-linux/sstate-cache"

# Parallelism, tuned for a 32 GB RAM host.
# Rule of thumb: BB_NUMBER_THREADS * avg-peak-RAM-per-task < available RAM.
# Heavy tasks here are onnxruntime (8-12 GB at link time), TFLite (4-6 GB)
# and OpenCV (2-3 GB). With 32 GB and no swap, 6 tasks at 3 make threads
# keeps the peak under roughly 28 GB. Add a swapfile (see bin/edgeos-host-setup)
# for headroom.
BB_NUMBER_THREADS = "6"
PARALLEL_MAKE     = "-j 3"

# Per-recipe caps for known memory-intensive C++ builds:
# onnxruntime does LLVM-style optimisation passes that can spike to 8-12 GB.
# Pin it to a single make thread on 32 GB hosts so it cannot co-link with itself.
PARALLEL_MAKE:pn-onnxruntime        = "-j 1"
# TFLite links large XNNPack / RUY objects. 2 threads is the safe ceiling on 32 GB.
PARALLEL_MAKE:pn-tensorflow-lite    = "-j 2"
# VX delegate links against the GC GPU stack, also heavy at link time.
PARALLEL_MAKE:pn-tensorflow-lite-vx-delegate = "-j 1"
# OpenCV with contrib modules can spike during template instantiation.
PARALLEL_MAKE:pn-opencv             = "-j 3"
# ROS 2 C++ packages use heavy template metaprogramming.
PARALLEL_MAKE:pn-ros-base           = "-j 3"
PARALLEL_MAKE:pn-rclcpp             = "-j 3"

# Complete in-progress tasks before spawning new ones. Reduces memory peaks
# by preventing multiple heavyweight link phases from overlapping.
BB_SCHEDULER = "completion"

# Build statistics and conflict resolution.
USER_CLASSES  ?= "buildstats"
PATCHRESOLVE   = "noop"

# Disk space guards.
BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

PACKAGECONFIG:append:pn-qemu-system-native = " sdl"

# Disk space management.
# Delete each recipe's work directory after it is successfully packaged.
# Saves 100-200 GB on a full build. The sstate-cache preserves build output
# so recipes are not rebuilt on the next run.
INHERIT += "rm_work"
# Keep these around in case we need to inspect them after a failure.
RM_WORK_EXCLUDE += "onnxruntime tensorflow-lite python3-ultralytics"

# CVE database: use cached copy, never fetch live from NVD during builds.
# The NVD API rate-limits aggressively and can stall the build indefinitely.
CVE_DB_UPDATE_INTERVAL = "-1"

# Fetch mirrors.
# Rust crates from crates.io are rate-limited and occasionally unreachable.
# Point the crate:// fetcher at the Yocto public mirror first so the build
# does not stall waiting for crates.io retries.
PREMIRRORS:prepend = "crate://crates.io/.* https://downloads.yoctoproject.org/mirror/sources/ \n"

# Note for 32 GB hosts:
# Before the first build, run:    sudo bin/edgeos-host-setup
# That script sets vm.overcommit_memory=1, vm.swappiness=10, and creates a
# 32 GB swapfile at /swapfile_edgeos. Without these tweaks, the onnxruntime
# and TFLite link phases will OOM-kill the bitbake worker on a 32 GB host.
